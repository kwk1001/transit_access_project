project:
  city_id: boston
  city_label: Boston
  survey_name: Synthetic OD (no local travel survey)
  survey_wave: synthetic_2025
  timezone: America/New_York

survey:
  source_id: boston_synthetic_2025
  adapter: cmap_phase1
  zip_path: data/raw/surveys/boston/placeholder_not_used_in_synthetic_mode.zip
  keep_complete_only: true

analysis_area:
  tract_year: 2023
  county_outline_year: 2023
  zip_zcta_year: 2020
  counties:
    - state: MA
      county: Suffolk
    - state: MA
      county: Middlesex
    - state: MA
      county: Norfolk
    - state: MA
      county: Essex
    - state: MA
      county: Plymouth

geography:
  analysis_unit: tract

osm:
  download_url: https://download.geofabrik.de/north-america/us/massachusetts-latest.osm.pbf
  local_pbf_path: data/raw/osm/boston/massachusetts-latest.osm.pbf

study_periods:
  - period_id: P1
    period_label: 2025-08-04_to_2025-08-25
    period_start: 2025-08-04
    period_end_exclusive: 2025-08-25
  - period_id: P2
    period_label: 2025-08-25_to_2025-09-08
    period_start: 2025-08-25
    period_end_exclusive: 2025-09-08
  - period_id: P3
    period_label: 2025-09-08_to_2025-09-29
    period_start: 2025-09-08
    period_end_exclusive: 2025-09-29

analysis_calendar:
  weekday_only: true
  excluded_dates:
    - 2025-09-01

od_scenarios:
  - scenario_id: peak
    scenario_label: Peak, all purposes
    weekday_only: true
    allowed_travel_dow: []
    transit_only: false
    allowed_purpose_groups: []
    allowed_mode_groups: []
    exclude_same_tract: true
    time_bin_rules:
      - time_bin: peak
        start_time: 07:30:00
        end_time: 09:30:00
  - scenario_id: midday
    scenario_label: Midday, all purposes
    weekday_only: true
    allowed_travel_dow: []
    transit_only: false
    allowed_purpose_groups: []
    allowed_mode_groups: []
    exclude_same_tract: true
    time_bin_rules:
      - time_bin: midday
        start_time: 11:00:00
        end_time: 14:00:00

synthetic_survey:
  enabled: true
  max_travel_minutes: 180
  include_same_origin_destination: false

auxiliary_weights:
  origin_multiplier_file: null
  origin_id_col: GEOID
  origin_multiplier_col: multiplier
  destination_multiplier_file: null
  destination_id_col: GEOID
  destination_multiplier_col: multiplier

r5r_network:
  java_memory: 16G
  overwrite_networks: false
  java_active_processors: 6

routing:
  modes:
    - WALK
    - TRANSIT
  max_walk_time: 30
  walk_speed: 4.68
  max_trip_duration: 180
  max_rides: 4
  max_lts: 2
  percentiles:
    - 50
  service_area_buffer_m: 2000
  restrict_to_service_area: true
  origin_chunk_size: 10
  destination_chunk_size: 200
  date_strategy: sample_n_dates_per_period
  sample_n_dates_per_period: 3
  n_threads: 2
  unreachable_penalty_minutes: 180
  routing_windows:
    - time_window_id: peak
      time_window_label: Peak
      od_scenario_id: peak
      start_time: 07:30:00
      end_time: 09:30:00
    - time_window_id: midday
      time_window_label: Midday
      od_scenario_id: midday
      start_time: 11:00:00
      end_time: 14:00:00

map:
  default_comparison_id: P3_vs_P1
  default_time_window_id: peak
  od_top_pairs_max: 500
  od_top_pairs_default: 100
  comparison_metrics:
    - delta_avg_weighted_travel_time_penalized
    - delta_pct_weighted_travel_time_penalized
    - delta_unreachable_share_weighted
    - share_weight_increase_gt_10
    - share_weight_becomes_unreachable
  period_metrics:
    - avg_weighted_travel_time_penalized
    - share_unreachable_weighted
    - share_accessible_45min_weighted

gtfs_feeds:
  - feed_name: MBTA_0807
    valid_start: 2025-07-31
    valid_end_exclusive: 2025-08-24
    gtfs_files:
      - data/raw/gtfs/boston/MBTA-08-07.zip
  - feed_name: MBTA_0829
    valid_start: 2025-08-22
    valid_end_exclusive: 2025-12-14
    gtfs_files:
      - data/raw/gtfs/boston/MBTA-08-29.zip

optional_covariates:
  download_population: false

run_management:
  run_label: null
