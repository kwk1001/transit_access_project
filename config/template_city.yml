project:
  city_id: new_city
  city_label: New City
  survey_name: Replace me
  survey_wave: baseline
  timezone: America/New_York

survey:
  source_id: new_city_baseline
  adapter: replace_with_adapter_name
  zip_path: data/raw/surveys/new_city/survey.zip
  keep_complete_only: true

analysis_area:
  tract_year: 2023
  county_outline_year: 2023
  counties:
    - state: XX
      county: Example

osm:
  download_url: https://download.geofabrik.de/north-america/us/example-latest.osm.pbf
  local_pbf_path: data/raw/osm/new_city/example-latest.osm.pbf

study_periods:
  - period_id: P1
    period_label: baseline
    period_start: 2025-08-04
    period_end_exclusive: 2025-08-25

analysis_calendar:
  weekday_only: true
  excluded_dates: []

od_scenarios:
  - scenario_id: peak
    scenario_label: Peak, all purposes
    weekday_only: true
    allowed_travel_dow: []
    transit_only: false
    allowed_purpose_groups: []
    allowed_mode_groups: []
    exclude_same_tract: true
    time_bin_rules:
      - time_bin: peak
        start_time: 07:30:00
        end_time: 09:30:00

auxiliary_weights:
  origin_multiplier_file: null
  origin_id_col: GEOID
  origin_multiplier_col: multiplier
  destination_multiplier_file: null
  destination_id_col: GEOID
  destination_multiplier_col: multiplier

r5r_network:
  java_memory: 12G
  overwrite_networks: false
  java_active_processors: 2

routing:
  modes: [WALK, TRANSIT]
  max_walk_time: 30
  walk_speed: 4.68
  max_trip_duration: 180
  max_rides: 4
  max_lts: 2
  percentiles: [50]
  service_area_buffer_m: 2000
  restrict_to_service_area: true
  origin_chunk_size: 50
  date_strategy: sample_n_dates_per_period
  sample_n_dates_per_period: 3
  n_threads: 2
  unreachable_penalty_minutes: 180
  routing_windows:
    - time_window_id: peak
      time_window_label: Peak
      od_scenario_id: peak
      start_time: 07:30:00
      end_time: 09:30:00

map:
  default_comparison_id: P1_vs_P1
  default_time_window_id: peak
  od_top_pairs_max: 500
  od_top_pairs_default: 100
  comparison_metrics: []
  period_metrics:
    - avg_weighted_travel_time_penalized

gtfs_feeds:
  - feed_name: FEED_A
    valid_start: 2025-08-04
    valid_end_exclusive: 2025-08-25
    gtfs_files:
      - data/raw/gtfs/new_city/feed_a.zip

optional_covariates:
  download_population: false

run_management:
  run_label: null
